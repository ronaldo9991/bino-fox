version: 1.0
runtime: nodejs20

# Full-stack monorepo build configuration
build:
  commands:
    build:
      - echo "🚀 Building full-stack monorepo application..."
      - echo "📦 Installing dependencies..."
      - npm ci
      - echo "🔨 Building frontend (React/Vite)..."
      - npm run build:frontend
      - echo "🔨 Building backend (Express/TypeScript)..."
      - npm run build:backend
      - echo "🗄️ Initializing database schema..."
      - npm run db:push || echo "⚠️ Schema already initialized or drizzle-kit not available"
      - echo "✅ Build complete!"

# Production runtime configuration
run:
  runtime-version: 20
  command: npm run start:apprunner
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "8080"
    # Database Configuration - Set these in App Runner Console
    - name: DATABASE_URL
      value: ${DATABASE_URL}
    # Session Configuration
    - name: SESSION_SECRET
      value: ${SESSION_SECRET}
    # Frontend URL (update with your App Runner URL)
    - name: FRONTEND_URL
      value: ${FRONTEND_URL}
    # Stripe Configuration (optional)
    - name: STRIPE_SECRET_KEY
      value: ${STRIPE_SECRET_KEY}
    - name: STRIPE_PUBLISHABLE_KEY
      value: ${STRIPE_PUBLISHABLE_KEY}
    - name: VITE_STRIPE_PUBLISHABLE_KEY
      value: ${VITE_STRIPE_PUBLISHABLE_KEY}

# Health check configuration for AWS App Runner
health-check:
  path: /api/health
  interval: 30
  timeout: 5
  healthy-threshold: 2
  unhealthy-threshold: 3

# Auto-scaling configuration
auto-scaling:
  min-size: 1
  max-size: 10
  target-cpu-utilization: 70

# Security
security:
  iam-role: arn:aws:iam::ACCOUNT-ID:role/AppRunnerECRAccessRole

